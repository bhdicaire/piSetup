---
- name: Ensure NetworkManager and Python dependencies are installed
  become: true
  apt:
    name:
      - network-manager
      - python3-dbus
      - python3-gi
    state: present
    update_cache: yes

- name: Ensure NetworkManager is started and enabled
  become: true
  service:
    name: NetworkManager
    state: started
    enabled: yes

- name: Disable IPv6
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    sysctl_file: /etc/sysctl.d/99-disable-ipv6.conf
    reload: true
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6

- name: Configure VLAN 80 Interface
  become: true
  community.general.nmcli:
    conn_name: "VLAN-{{ network_setup.vlan_id }}"
    ifname: "{{ network_setup.vlan_name }}"
    type: vlan
    vlanid: "{{ network_setup.vlan_id }}"
    vlandev: "{{ network_setup.vlan_interface }}"
    state: present
    method4: "{{ network_setup.method }}"
    ip4: "{{ network_setup.ip_address | default(omit) }}"
    gw4: "{{ network_setup.gateway | default(omit) }}"
    dns4: "{{ network_setup.dns_servers | default(omit) }}"
    route_metric4: 10
  register: vlan_setup

- name: Lockdown native eth0 (Kill IPv4/DHCP)
  become: true
  community.general.nmcli:
    conn_name: "{{ network_setup.vlan_interface }}"
    ifname: "{{ network_setup.vlan_interface }}"
    type: ethernet
    state: present
    method4: disabled  # This removes the 192.168.x.x IP
    route_metric4: 2000
  register: eth0_lockdown

- name: Apply network changes
  become: true
  shell: |
    nmcli connection reload
    nmcli connection up "VLAN-{{ network_setup.vlan_id }}"
  register: net_apply
  # We ignore failures here because if the IP changes,
  # the SSH connection might drop, which Ansible sees as a failure.
  ignore_unreachable: yes
  failed_when: false
  when: vlan_setup.changed or eth0_lockdown.changed

- name: Wait for connection to migrate to VLAN 80
  wait_for_connection:
    delay: 5
    timeout: 60
