---
# roles/roon/defaults/main.yml — Defaults for Roon Server role

roon_data_root: /var/roon
roon_music_mount: /mnt/music
roon_nfs_options: "ro,hard,intr,nfsvers=3,noatime,nolock"
roon_installer_url: "https://download.roonlabs.com/builds/roonserver-installer-linuxx64.sh"

# Packages required by Roon Server
roon_packages:
  - ffmpeg
  - curl
  - nfs-common
  - bzip2
  - cifs-utils
  - alsa-utils
  # libicu is required by Roon — version varies by Debian release:
  #   Bookworm=libicu72, Trixie=libicu76
  # Installed dynamically in tasks/main.yml via apt pattern matching