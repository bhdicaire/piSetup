---
# roles/roon/tasks/main.yml — Install and configure Roon Server

- name: Install Roon Server dependencies
  ansible.builtin.apt:
    update_cache: true
    name: "{{ roon_packages }}"
    state: present

- name: Detect available libicu version
  ansible.builtin.shell: >
    apt-cache search '^libicu[0-9]+$' | head -1 | awk '{print $1}'
  register: libicu_pkg
  changed_when: false

- name: Install libicu (Roon dependency)
  ansible.builtin.apt:
    name: "{{ libicu_pkg.stdout }}"
    state: present
  when: libicu_pkg.stdout | length > 0

# --- NFS Mount for Music Library ---
- name: Create music mount point
  ansible.builtin.file:
    path: "{{ roon_music_mount }}"
    state: directory
    mode: "0755"

- name: Mount NFS music library
  ansible.posix.mount:
    src: "{{ roon_nfs_server }}:{{ roon_nfs_export }}"
    path: "{{ roon_music_mount }}"
    fstype: nfs
    opts: "{{ roon_nfs_options }}"
    state: mounted

- name: Verify NFS mount is accessible
  ansible.builtin.command: ls {{ roon_music_mount }}
  register: nfs_check
  changed_when: false
  failed_when: nfs_check.rc != 0

# --- Roon Data Directory ---
- name: Create Roon data directory
  ansible.builtin.file:
    path: "{{ roon_data_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

# --- Install Roon Server ---
- name: Check if Roon Server is already installed
  ansible.builtin.stat:
    path: /opt/RoonServer/start.sh
  register: roon_installed

- name: Download and install Roon Server
  when: not roon_installed.stat.exists
  block:
    - name: Download Roon Server installer
      ansible.builtin.get_url:
        url: "{{ roon_installer_url }}"
        dest: /tmp/roonserver-installer.sh
        mode: "0755"

    - name: Run Roon Server installer (non-interactive)
      ansible.builtin.command: /tmp/roonserver-installer.sh
      environment:
        ROON_DATAROOT: "{{ roon_data_root }}"
      args:
        stdin: "Y"
      changed_when: true

    - name: Clean up installer
      ansible.builtin.file:
        path: /tmp/roonserver-installer.sh
        state: absent

# --- Systemd Service ---
- name: Deploy Roon Server systemd unit
  ansible.builtin.template:
    src: roonserver.service.j2
    dest: /etc/systemd/system/roonserver.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart Roon Server

- name: Enable and start Roon Server
  ansible.builtin.systemd:
    name: roonserver
    enabled: true
    state: started
    daemon_reload: true

# --- Firewall (optional — only if ufw is present) ---
- name: Check if ufw is installed
  ansible.builtin.command: which ufw
  register: ufw_check
  failed_when: false
  changed_when: false

- name: Configure firewall for Roon
  when: ufw_check.rc == 0
  block:
    - name: Allow Roon discovery (UDP 9003)
      community.general.ufw:
        rule: allow
        port: "9003"
        proto: udp
        comment: "Roon RAAT discovery"

    - name: Allow Roon core TCP (9330-9339)
      community.general.ufw:
        rule: allow
        port: "9330:9339"
        proto: tcp
        comment: "Roon core + display"

    - name: Allow Roon streaming (TCP 30000-30010)
      community.general.ufw:
        rule: allow
        port: "30000:30010"
        proto: tcp
        comment: "Roon RAAT streaming"

    - name: Allow Roon ARC (TCP 55000)
      community.general.ufw:
        rule: allow
        port: "55000"
        proto: tcp
        comment: "Roon ARC remote access"