---
- name: Generate locale
  ansible.builtin.shell: |
    sed -i 's/^# *\(en_US.UTF-8\)/\1/' /etc/locale.gen
    locale-gen
    update-locale LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8
  args:
    creates: /usr/lib/locale/locale-archive

- name: Install sudo and dependencies
  ansible.builtin.apt:
    name:
      - sudo
      - curl
      - git
    state: present
    update_cache: true

- name: Configure Debian host
  block:
    - name: Disable cloud-init to prevent hostname reverts
      become: true
      file:
        path: /etc/cloud/cloud-init.disabled
        state: touch
        owner: root
        group: root
        mode: '0644'

    - name: Set system timezone
      ansible.builtin.timezone:
        name: "{{ timezone }}"

    - name: Set hostname
      become: true
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"
      register: hostname_changed

    - name: Update /etc/hosts for local resolution
      become: true
      lineinfile:
        path: /etc/hosts
        regexp: '^127.0.1.1'
        line: "127.0.1.1 {{ inventory_hostname }}"

    - name: Restart Avahi to broadcast new name
      become: true
      systemd:
        name: avahi-daemon
        state: restarted
      when: hostname_changed.changed

- name: Create ops user
  ansible.builtin.user:
    name: "{{ common_ops_user }}"
    uid: "{{ common_ops_uid }}"
    shell: "{{ common_ops_shell }}"
    groups: ["sudo"]
    append: true
    create_home: true
    state: present

- name: Set up SSH authorized key for ops
  ansible.posix.authorized_key:
    user: "{{ common_ops_user }}"
    key: "{{ ops_ssh_public_key }}"
    state: present
    exclusive: false

- name: Allow ops passwordless sudo
  ansible.builtin.copy:
    content: "{{ common_ops_user }} ALL=(ALL) NOPASSWD:ALL\n"
    dest: "/etc/sudoers.d/{{ common_ops_user }}"
    mode: "0440"
    validate: "visudo -cf %s"

- name: Harden SSH — disable root login and password auth
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
  notify: Restart SSH

- name: Fix initramfs-tools MODULES configuration
  block:
    - name: Fix initramfs-tools MODULES configuration
      become: true
      lineinfile:
        path: /etc/initramfs-tools/initramfs.conf
        regexp: '^MODULES='
        line: 'MODULES=most'
      register: initramfs_config

    - name: Update initramfs if config changed
      become: true
      command: update-initramfs -u
      when: initramfs_config.changed
